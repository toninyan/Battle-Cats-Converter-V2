<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>Battle Cats Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<h2>Battle Cats Converter V2</h2>

<p>背景画像</p>

<input
type="file"
id="backgroundFile"
accept=".png">

<br><br>

<p>キャラZIP</p>

<input
type="file"
id="zipFile"
accept=".zip">

<br><br>

<button id="convert">
変換
</button>

<script>

document
.getElementById("convert")
.onclick = convert;

async function convert(){

    const background =
    document
    .getElementById("backgroundFile")
    .files[0];

    const zipFile =
    document
    .getElementById("zipFile")
    .files[0];

    if(!background){

        alert("背景画像を選択してください");

        return;

    }

    if(!zipFile){

        alert("ZIPを選択してください");

        return;

    }
    // ZIPを読み込む
const zip = await JSZip.loadAsync(zipFile);

// PNGだけ取得
const images = [];

for (const name in zip.files) {

    if (name.toLowerCase().endsWith(".png")) {
        images.push(name);
    }

}

// 数字順
images.sort((a, b) => {

    const numA = parseInt(a.match(/\d+(?=\.[^.]+$)/)[0]);
    const numB = parseInt(b.match(/\d+(?=\.[^.]+$)/)[0]);

    return numA - numB;

});

//15fps
const outputImages = [];

for (let i = 0; i < images.length; i += 2) {

    outputImages.push(images[i]);

}

const backgroundImage =
await loadImage(background);

const bg =
imageToCanvas(backgroundImage);

const bgPixels =
bg.ctx.getImageData(
    0,
    0,
    bg.canvas.width,
    bg.canvas.height
);

const firstImage =
zip.file(outputImages[0]);

const firstBlob =
await firstImage.async("blob");

const firstPNG =
await loadImage(firstBlob);

const cat =
imageToCanvas(firstPNG);

const catPixels =
cat.ctx.getImageData(
    0,
    0,
    cat.canvas.width,
    cat.canvas.height
);

removeBackground(
    bgPixels,
    catPixels
);

cat.ctx.putImageData(
    catPixels,
    0,
    0
);

// プレビュー表示
document.body.appendChild(cat.canvas);

alert("背景削除成功！");
}
async function loadImage(file){

    return new Promise((resolve)=>{

        const img = new Image();

        img.onload=()=>{

            resolve(img);

        };

        img.src=
        URL.createObjectURL(file);

    });

}
function imageToCanvas(image){

    const canvas = document.createElement("canvas");

    canvas.width = image.width;
    canvas.height = image.height;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(image,0,0);

    return {
        canvas,
        ctx
    };
    function removeBackground(bgPixels, catPixels){

    const tolerance = 8;

    const bg = bgPixels.data;
    const cat = catPixels.data;

    for(let i = 0; i < bg.length; i += 4){

        const dr = Math.abs(bg[i] - cat[i]);
        const dg = Math.abs(bg[i+1] - cat[i+1]);
        const db = Math.abs(bg[i+2] - cat[i+2]);

        if(
            dr <= tolerance &&
            dg <= tolerance &&
            db <= tolerance
        ){
            cat[i+3] = 0;
        }

    }

}

}
</script>

</body>

</html>
