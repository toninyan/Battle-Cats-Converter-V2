<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>Battle Cats Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<h2>Battle Cats Converter V2</h2>

<p>иғҢжҷҜз”»еғҸ</p>

<input
type="file"
id="backgroundFile"
accept=".png">

<br><br>

<p>гӮӯгғЈгғ©ZIP</p>

<input
type="file"
id="zipFile"
accept=".zip">

<br><br>

<button id="convert">
еӨүжҸӣ
</button>

<script>

document
.getElementById("convert")
.onclick = convert;

async function convert(){

    const background =
    document
    .getElementById("backgroundFile")
    .files[0];

    const zipFile =
    document
    .getElementById("zipFile")
    .files[0];

    if(!background){

        alert("иғҢжҷҜз”»еғҸгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");

        return;

    }

    if(!zipFile){

        alert("ZIPгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");

        return;

    }

   const backgroundImage =
await loadImage(background);

alert(
    backgroundImage.width +
    " Г— " +
    backgroundImage.height
);

}
async function loadImage(file){

    return new Promise((resolve)=>{

        const img = new Image();

        img.onload=()=>{

            resolve(img);

        };

        img.src=
        URL.createObjectURL(file);

    });

}
</script>

</body>

</html>
